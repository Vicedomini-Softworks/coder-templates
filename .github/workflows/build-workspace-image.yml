name: Build and push workspace image

on:
  push:
    branches: [main]
    paths:
      - "railway/build/**"
      - ".github/workflows/build-workspace-image.yml"
  workflow_dispatch: {}

env:
  IMAGE_NAME: vicedominisoftworks/railway-vicedominidev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: railway/build
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  update-coder:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      CODER_URL: https://${{ vars.CODER_DOMAIN || secrets.CODER_DOMAIN }}
      CODER_SESSION_TOKEN: ${{ secrets.CODER_SESSION_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Coder CLI
        run: curl -fsSL https://coder.com/install.sh | sh

      - name: Push new template version
        working-directory: railway
        run: |
          coder templates push railway \
            --directory . \
            --variable "railway_token=${{ secrets.RAILWAY_TOKEN }}" \
            --variable "workspace_image=docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --message "CI: image ${{ github.sha }}" \
            --yes

      # Deliberately no auto-update/restart of running workspaces here:
      # each workspace owner decides when to pick up the new template
      # version (`coder update <workspace>`, or their own auto-update
      # policy), since a restart interrupts whatever they're doing.
